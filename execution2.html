  <style>

      --bg-2: #111b2a;
      --surface: rgba(20, 29, 44, 0.9);
      --surface-2: rgba(29, 39, 60, 0.95);
      --surface-3: rgba(13, 20, 34, 0.96);
      --surface-glass: rgba(20, 29, 44, 0.76);
      --text: #eef3fb;
      --text-soft: #b3bfd2;
      --text-muted: #8994a7;
      --line: rgba(255, 255, 255, 0.1);
      --line-2: rgba(255, 255, 255, 0.06);
      --blue: #8eb5ff;
      --blue-2: #6988cf;
      --blue-soft: rgba(142, 181, 255, 0.18);
      --green: #89d5ba;
      --amber: #f0bf7f;
      --red: #f39eab;
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.32);
      --radius-xl: 32px;
      --radius-lg: 24px;
      --radius-md: 18px;
      --radius-sm: 14px;
      --max: 1480px;
    }

    body.theme-light {
      --bg: #f3efe7;
      --bg-2: #ebe6dd;
      --surface: rgba(255, 252, 248, 0.9);
      --surface-2: rgba(255, 255, 255, 0.96);
      --surface-3: rgba(248, 244, 238, 0.98);
      --surface-glass: rgba(255, 255, 255, 0.74);
      --text: #192330;
      --text-soft: #566172;
      --text-muted: #788393;
      --line: rgba(25, 35, 48, 0.12);
      --line-2: rgba(25, 35, 48, 0.08);
      --blue: #5f86dc;
      --blue-2: #7ca0ef;
      --blue-soft: rgba(95, 134, 220, 0.14);
      --green: #2f8769;
      --amber: #b67b2d;
      --red: #b65268;
      --shadow: 0 24px 60px rgba(30, 35, 45, 0.12);

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      overflow-x: hidden;
      font-family: "Manrope", system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top center, rgba(105, 141, 215, 0.16), transparent 26%),
        linear-gradient(180deg, #141b29 0%, var(--bg) 24%, #08111a 100%);

    }

    body.theme-light {
      background:
        radial-gradient(circle at top center, rgba(95, 134, 220, 0.16), transparent 26%),
        linear-gradient(180deg, #f6f1e9 0%, var(--bg) 24%, #f1ede5 100%);
    }

    a { color: inherit; text-decoration: none; }
    button, input, select, textarea { font: inherit; }

    .shell {
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 40;
      padding: 18px 18px 0;
      backdrop-filter: blur(10px);
      background: linear-gradient(180deg, rgba(9, 17, 28, 0.94), rgba(9, 17, 28, 0.58) 72%, transparent);
    }

    body.theme-light .topbar {
      background: linear-gradient(180deg, rgba(243, 239, 231, 0.94), rgba(243, 239, 231, 0.58) 72%, transparent);
    }

    .topbar-inner {

      padding: 18px 22px;

      align-items: center;
      gap: 16px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--surface-glass);
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px) saturate(140%);

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 220px;
    }

    .brand-mark {

      height: 48px;

      color: #f7fbff;
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 1.28rem;
      font-weight: 700;

    body.theme-light .brand-mark {

        radial-gradient(circle at top left, rgba(95, 134, 220, 0.18), transparent 42%),

      color: #21304a;

    .stat-label, .section-label, .sub-label {

      flex-wrap: wrap;
      margin-bottom: 22px;
    }

      background: rgba(255, 255, 255, 0.05);
      color: var(--text-soft);
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 800;
      cursor: pointer;
    }

    .page-tab.active {
      color: white;

      background: linear-gradient(180deg, var(--blue), var(--blue-2));
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));

      min-width: 0;

    .section-title {
      font-size: 2rem;

      color: var(--text-soft);

      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));

      margin-top: 18px;

      min-width: 0;

    label {

      letter-spacing: 0.06em;
      color: var(--text-soft);
      text-transform: uppercase;

    input[type="text"], input[type="email"], input[type="password"], input[type="time"], input[type="url"], textarea, select {

      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      border-radius: 16px;
      padding: 14px 15px;
      outline: none;

    body.theme-light input[type="email"],

    body.theme-light input[type="time"],

      display: grid;
      gap: 14px;
      margin-top: 18px;

    .task-list { grid-template-columns: 1fr; }
    .trigger-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .choice-row { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .guide-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .trend-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }

    .task-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;

    .task-info {
      min-width: 0;

    .task-info strong {
      display: block;
      margin-bottom: 6px;
      font-size: 1rem;

      font-size: 0.95rem;
      color: var(--text-soft);

    }

    .guide-card p, .history-item p, .proof-item p, .setup-copy, .auth-copy {
      color: var(--text-soft);

      background: linear-gradient(180deg, transparent 42%, rgba(95, 134, 220, 0.2) 42%);

      font-weight: 800;

    body.theme-light .proof-item,

    .history-item strong, .proof-item strong {

      margin-bottom: 6px;
      color: var(--text);

    .auth-shell, .setup-shell {
      max-width: 560px;
      margin: 0 auto;
      padding: 72px 20px;
    }

    .auth-card, .setup-card {
      background:
        radial-gradient(circle at top right, rgba(142, 181, 255, 0.08), transparent 28%),
        linear-gradient(180deg, rgba(24, 33, 49, 0.98), rgba(17, 26, 40, 0.98));

      background:

    .inline-row {

    .danger {
      color: var(--red);

      color: var(--green);

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      * { transition: none !important; }
    }

</head>
<body>
  <div id="root"></div>
  <script type="module">
    import React from "https://esm.sh/react@18.3.1";
    import { createRoot } from "https://esm.sh/react-dom@18.3.1/client";
    import htm from "https://esm.sh/htm@3.1.1";

    const html = htm.bind(React.createElement);

    const CONFIG = window.STEADY_PATH_CONFIG || null;
    const supabase = CONFIG?.supabaseUrl && CONFIG?.supabaseAnonKey
      ? createClient(CONFIG.supabaseUrl, CONFIG.supabaseAnonKey)
      : null;

    const DRIFT_TRIGGERS = [
      { key: "porn", label: "Porn" },
      { key: "doom_scrolling", label: "Doom scrolling" },
      { key: "fantasy_loop", label: "Fantasy loop" },

    function isoDateForTimezone(timezone, date = new Date()) {
      return new Intl.DateTimeFormat("en-CA", {
        timeZone: timezone,
        year: "numeric",
        month: "2-digit",
        day: "2-digit"
      }).format(date);
    }

    function weekdayForTimezone(timezone, date = new Date()) {
      return new Intl.DateTimeFormat("en-US", {
        timeZone: timezone,
        weekday: "long"
      }).format(date).toLowerCase();
    }

    function displayDateForTimezone(timezone, date = new Date()) {
      return new Intl.DateTimeFormat("en-IN", {
        timeZone: timezone,
        weekday: "long",
        month: "long",
        day: "numeric",
        year: "numeric"
      }).format(date);
    }

    function parseIsoDate(dateString) {
      const [year, month, day] = dateString.split("-").map(Number);
      return new Date(Date.UTC(year, month - 1, day));
    }

    function formatIsoDate(date) {
      const year = date.getUTCFullYear();
      const month = String(date.getUTCMonth() + 1).padStart(2, "0");
      const day = String(date.getUTCDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function addUtcDays(dateString, amount) {
      const date = parseIsoDate(dateString);
      date.setUTCDate(date.getUTCDate() + amount);
      return formatIsoDate(date);
    }

    function startOfWeekIso(dateString) {
      const date = parseIsoDate(dateString);
      const weekday = date.getUTCDay();
      const offset = weekday === 0 ? -6 : 1 - weekday;
      date.setUTCDate(date.getUTCDate() + offset);
      return formatIsoDate(date);
    }

    function safeTimeCompare(timeValue, threshold) {
      if (!timeValue) return false;
      return timeValue <= threshold;
    }

    function computeSleepQualified(entry) {
      return safeTimeCompare(entry.sleep_time || "", "23:30");
    }

    function computeMinimumDay(entry) {
      return Boolean(
        entry.minimum_build_completed &&
        entry.minimum_pushups_completed &&
        entry.minimum_no_porn_completed &&
        safeTimeCompare(entry.sleep_time || "", "24:00")
      );
    }

    function computeFullDay(entry) {
      return Boolean(
        entry.big_goal_completed &&
        entry.study_build_completed &&
        entry.exercise_completed &&
        computeSleepQualified(entry)
      );
    }

    function computeNoZeroDay(entry, proofCount) {
      return Boolean(
        proofCount > 0 ||
        entry.minimum_build_completed ||
        entry.study_build_completed ||
        entry.exercise_completed ||
        computeMinimumDay(entry)
      );
    }

    function computeRealityScore(entry, driftCount, proofCount) {
      let score = 0;
      if (entry.big_goal_completed) score += 25;
      if (entry.study_build_completed) score += 20;
      if (entry.exercise_completed) score += 20;
      if (computeSleepQualified(entry)) score += 15;
      if ((entry.silent_time_minutes || 0) >= 20) score += 10;
      if (proofCount > 0) score += 10;
      score -= driftCount * 6;
      if (entry.fantasy_detection_answer === "yes") score -= 10;
      if (entry.fantasy_detection_answer === "a_little") score -= 4;
      return Math.max(0, Math.min(100, score));
    }

    function rich(text) {
      const parts = text.split(/(\[\[.*?\]\]|\(\(.*?\)\))/g).filter(Boolean);
      return parts.map((part, index) => {
        if (part.startsWith("[[") && part.endsWith("]]")) {
          return html`<span key=${index} className="mark">${part.slice(2, -2)}</span>`;
        }
        if (part.startsWith("((") && part.endsWith("))")) {
          return html`<span key=${index} className="line-mark">${part.slice(2, -2)}</span>`;
        }
        return html`<span key=${index}>${part}</span>`;
      });
    }

    function getTodayState(entry, proofsCount, driftCount) {
      const full = computeFullDay(entry);
        const min = computeMinimumDay(entry) || entry.minimum_viable_day_completed;
      const noZero = computeNoZeroDay(entry, proofsCount);
      if (full) {
        return {
          full,
          min,
          noZero,
          sleepQualified: computeSleepQualified(entry),
          realityScore: computeRealityScore(entry, driftCount, proofsCount),
          status: "full_success"
        };
      }
      if (min || noZero) {
        return {
          full,
          min,
          noZero,
          sleepQualified: computeSleepQualified(entry),
          realityScore: computeRealityScore(entry, driftCount, proofsCount),
          status: "minimum_day"
        };
      }
      return {
        full,
        min,
        noZero,
        sleepQualified: computeSleepQualified(entry),
        realityScore: computeRealityScore(entry, driftCount, proofsCount),
        status: "miss"
      };
    }

      async function refreshStreakState(nextEntry, nextProofsCount, nextDriftCount) {
        if (!profile || !session) return;
        const rows = await supabase
          .from("daily_entries")
          .select("*")
          .eq("user_id", session.user.id)
          .order("date", { ascending: false })
          .limit(120);

        const mergedDays = (rows.data || []).map((row) => {
          if (row.date === nextEntry.date) {
            return {
              ...row,
              ...nextEntry,
              sleep_qualified: computeSleepQualified(nextEntry),
              reality_score: computeRealityScore(nextEntry, nextDriftCount, nextProofsCount),
              minimum_viable_day_completed: computeMinimumDay(nextEntry),
              no_zero_day_completed: computeNoZeroDay(nextEntry, nextProofsCount),
              full_day_completed: computeFullDay(nextEntry),
              proof_submitted: nextProofsCount > 0
            };
          }
          return row;
        }).sort((a, b) => a.date.localeCompare(b.date));

        const today = isoDateForTimezone(profile.timezone);
        const firstTrackedDate = mergedDays[0]?.date || today;
        const dayMap = new Map(mergedDays.map((row) => [row.date, row]));
        const allDays = [];
        for (let cursor = firstTrackedDate; cursor <= today; cursor = addUtcDays(cursor, 1)) {
          allDays.push(dayMap.get(cursor) || {
            date: cursor,
            full_day_completed: false,
            no_zero_day_completed: false,
            minimum_viable_day_completed: false
          });
        }

        let bestFullStreak = 0;
        let identitySaveCount = 0;
        let currentFull = 0;
        let currentNoZero = 0;
        let workingWeek = null;
        let graceUsedThisWeek = false;

        allDays.forEach((row) => {
          const weekStart = startOfWeekIso(row.date);
          if (workingWeek !== weekStart) {
            workingWeek = weekStart;
            graceUsedThisWeek = false;
          }

          if (row.full_day_completed) {
            currentFull += 1;
          } else if (!graceUsedThisWeek) {
            graceUsedThisWeek = true;
          } else {
            currentFull = 0;
          }

          bestFullStreak = Math.max(bestFullStreak, currentFull);

          if (row.no_zero_day_completed) {
            currentNoZero += 1;
          } else {
            currentNoZero = 0;
          }

          if (row.minimum_viable_day_completed && !row.full_day_completed) {
            identitySaveCount += 1;
          }
        });

        const currentWeekStart = startOfWeekIso(today);
        const currentWeekRows = allDays.filter((row) => startOfWeekIso(row.date) === currentWeekStart);
        const currentWeekMisses = currentWeekRows.filter((row) => !row.full_day_completed).length;
        const weeklyGraceAvailable = currentWeekMisses === 0;
        const streakState = {
          user_id: session.user.id,
          full_streak: currentFull,
          best_full_streak: Math.max(bestFullStreak, currentFull),
          no_zero_day_streak: currentNoZero,
          identity_save_count: identitySaveCount,
          weekly_grace_available: weeklyGraceAvailable,
          weekly_grace_last_reset_date: currentWeekStart,
          last_success_date: allDays.filter((row) => row.full_day_completed).slice(-1)[0]?.date || null
        };

        await supabase.from("streak_state").upsert(streakState);
        setStreak(streakState);
      }

            .from("daily_entries")

          setEntry(data);

            const { error: uploadError } = await supabase.storage.from("proof-of-day").upload(filePath, proofFile, { upsert: false });
            if (uploadError) throw uploadError;
            payload.storage_path = filePath;
          } else {
            throw new Error("Add proof content before submitting.");
          }

          const { data, error } = await supabase.from("proof_entries").insert(payload).select("*").single();
          if (error) throw error;
          const nextProofs = [data, ...proofs];
          setProofs(nextProofs);
          setProofText("");
          setProofUrl("");
          setProofFile(null);
          await persistEntry({ proof_submitted: true }, { proofsCount: nextProofs.length });
          setBannerMessage("Proof saved. Illusion loses power when the day leaves evidence.");
        } catch (error) {
          setBannerMessage(error.message || "Could not save proof.");
        }
      }

                      <div className="field-stack">
                        <label>Evening review</label>
                        <input type="time" value=${reminders.evening_checkin_time} onInput=${(e) => handleReminderPrefChange("evening_checkin_time", e.target.value)} />
                      </div>
                      <div className="field-stack">
                        <label>Timezone</label>
                        <input type="text" value=${profile.timezone} disabled />
                      </div>
                    </div>
                    <div className="hero-actions">
                      <button className="primary-btn" type="button" onClick=${requestNotifications}>
                        ${reminders.notifications_enabled ? "Notifications enabled" : "Enable browser notifications"}
                      </button>
                    </div>
                  </section>

                  <section className="panel">
                    <div className="section-label">Mission mode</div>
                    <h2 className="section-title">Reserved for later</h2>
                    <div className="mission-card">
                      <p>Exam mode, deep work week, dopamine detox week, and fitness reset week are intentionally not active in v1. The structure is ready, but the first job is to make the base system stable and honest.</p>
                    </div>
                  </section>
                </div>

                <aside className="side-stack">
                  <section className="panel">
                    <div className="section-label">Account</div>
                    <div className="proof-item">
                      <strong>${profileName}</strong>
                      <p>${session.user.email}</p>
                    </div>
                    <div className="proof-item" style=${{ marginTop: "14px" }}>
                      <strong>Save state</strong>
                      <p>${saveState === "idle" ? "Ready" : saveState}</p>
                    </div>
                  </section>
                </aside>
              </div>
            ` : null}
          </main>
        </div>
      `;
    }

    createRoot(document.getElementById("root")).render(html`<${App} />`);
  </script>
</body>
</html>
